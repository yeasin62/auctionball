; OPcache settings tuned for AuctionBall production.
;
; Drop into /etc/php/8.3/fpm/conf.d/10-opcache.ini (or wherever your distro
; loads PHP-FPM ini files), then `sudo systemctl reload php8.3-fpm`.
;
; OPcache caches the compiled bytecode of every PHP file, eliminating
; parse/compile work on every request. Typical 2-3x throughput boost with
; zero code changes — single biggest win in PHP performance tuning.
;
; Verify after reload:
;   php -r "var_dump(opcache_get_status()['opcache_enabled']);"   # → bool(true)
;   curl https://your-domain.com/dashboard  # should respond noticeably faster

[opcache]
opcache.enable=1
opcache.enable_cli=0

; Memory budget for compiled bytecode. 256 MB easily covers a Laravel app +
; vendor dir; raise to 512 MB if `opcache_get_status()` shows >85% used.
opcache.memory_consumption=256

; Interned-string buffer (deduped string storage). 16 MB is comfortable for
; mid-size Laravel apps.
opcache.interned_strings_buffer=16

; Max number of cached scripts. Run `find . -type f -name "*.php" | wc -l`
; on your project root and round up — 20000 covers most Laravel + vendor.
opcache.max_accelerated_files=20000

; In production we DON'T want OPcache re-checking the filesystem on every
; request — set to 0 and clear cache on deploy (handled by `php artisan
; opcache:clear` in your deploy script, or `systemctl reload php-fpm`).
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; Save bytecode + interned strings between FPM restarts (saves cold-start
; cost on each restart/deploy).
opcache.save_comments=1
opcache.fast_shutdown=1

; JIT — significant speedup for compute-heavy paths (PDF generation, large
; dashboards). 100 MB buffer is plenty.
opcache.jit=tracing
opcache.jit_buffer_size=100M

; Disable file-based cache (we have no shared filesystem in autoscaled
; deploys). If you're on a single VPS, uncomment to persist between FPM
; restarts:
; opcache.file_cache=/var/cache/opcache
; opcache.file_cache_only=0

; Log warnings but don't blow up the request on cache misses.
opcache.log_verbosity_level=1

; Preload — boots a baked-in script into shared memory at FPM startup.
; Enable once you have a stable bootstrap; leave commented during initial
; rollout because preload errors prevent FPM from starting.
;
; opcache.preload=/var/www/auctionball/preload.php
; opcache.preload_user=www-data
